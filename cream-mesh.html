<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Meshy mesh vs procedural</title>
<style>html,body{margin:0;background:#eef0ec;overflow:hidden}</style></head>
<body>
  <canvas id="c" width="760" height="640"></canvas>
  <script type="module">
    // Renders Meshy's actual mesh (geometry-baked wave) for comparison with the procedural map.
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

    const q = new URLSearchParams(location.search);
    const yaw = q.has('yaw') ? +q.get('yaw') : 0;
    const flat = q.has('flat');   // ?flat ⇒ override material to flat cream (ignore baked maps)

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(760, 640, false);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, 760 / 640, 0.1, 100);
    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const key = new THREE.DirectionalLight(0xffffff, 2.4); key.position.set(4, 6, 4); scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 1.0); fill.position.set(-3, 2, -2); scene.add(fill);

    new GLTFLoader().load('/wave.glb', (gltf) => {
      const root = gltf.scene;
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3(); box.getSize(size);
      const center = new THREE.Vector3(); box.getCenter(center);
      root.position.sub(center);                       // centre at origin
      root.rotation.y = yaw;
      if (flat) root.traverse(o => { if (o.isMesh) o.material = new THREE.MeshStandardMaterial({ color: 0xf7f1e8, roughness: 0.9, metalness: 0 }); });
      scene.add(root);
      // frame it
      const maxDim = Math.max(size.x, size.y, size.z);
      camera.position.set(0, size.y * 0.1, maxDim * 2.0);
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
      requestAnimationFrame(() => { renderer.render(scene, camera); window.__ready = true; });
    }, undefined, (e) => { document.title = 'ERR ' + e; window.__ready = true; });
  </script>
</body>
</html>
